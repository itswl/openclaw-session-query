services:
  openclaw-session-query-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-session-query-api
    ports:
      - "8080:8080"
    volumes:
      # 挂载 OpenClaw 数据目录（可选）
      - ~/.openclaw/agents/default/sessions:/root/.openclaw/agents/default/sessions:ro
      # 挂载 Hermes 数据目录（可选）
      - ~/.hermes/sessions:/root/.hermes/sessions:ro
    environment:
      # 运行模式：auto（自动检测）/ openclaw / hermes
      - MODE=${SESSION_MODE:-auto}
      # 认证令牌
      - HOOK_TOKEN=${HOOK_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
